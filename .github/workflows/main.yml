name: Qt CI Build & Test

on:
  pull_request:
    branches: [ main, other ] # Укажите ветки, для которых запускать проверку

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонируем репозиторий
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Устанавливаем системные зависимости для Qt на Linux
    - name: Install Ubuntu dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-shape0 libxcb-xfixes0

    # 3. Устанавливаем и кешируем Qt
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3' # Укажите вашу версию Qt (например, 5.15.2 или 6.7.0)
        arch: 'gcc_64'   # Архитектура для Linux
        cache: true      # Кеширование ускорит последующие сборки

    # 4. Конфигурируем проект через CMake
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    # 5. Собираем проект
    - name: Build Project
      run: |
        cmake --build build --config Release

    # 6. Запуск тестов (если они настроены в CMake через add_test / ctest)
    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure
